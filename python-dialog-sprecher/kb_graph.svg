    <text x="10" y="22" font-size="12" font-weight="700" fill="#d84315">Sprachmittlung mündlich</text>
    <text x="10" y="38" font-size="10" fill="#e85325">K153–176 · mouth after reading/hearing · relay output disappears</text>

    <!-- Cluster: DE→shared language -->
    <rect x="10" y="48" width="230" height="70" rx="4" fill="#fef2ee" stroke="#ffab91"/>
    <text x="20" y="64" font-size="10" font-weight="600" fill="#bf360c">DE → shared language</text>
    <text x="20" y="78" font-size="9" fill="#d84315">K153–166 · relay German info</text>
    <text x="20" y="90" font-size="9" fill="#d84315">to another person in common lang.</text>
    <text x="20" y="104" font-size="9" fill="#d84315">K163 ✍ (hand + seed)</text>

    <!-- Cluster: other→DE -->
    <rect x="255" y="48" width="230" height="70" rx="4" fill="#fef2ee" stroke="#ffab91"/>
    <text x="265" y="64" font-size="10" font-weight="600" fill="#bf360c">other language → DE</text>
    <text x="265" y="78" font-size="9" fill="#d84315">K167–176 · relay to German speaker</text>
    <text x="265" y="90" font-size="9" fill="#d84315">K173 · K174 · K175 · K176 ✍ (all hand)</text>
    <text x="265" y="104" font-size="9" fill="#d84315">shop door → toilet door → hotel board</text>
