<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0b5e55"/>
    </marker>
    <filter id="shadow" x="-02" y="-02" width="1.4" height="1.4">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#f4f6f7"/>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a2227">KB Compressed Graph — Clusters within Categories, Bridges across Channels</text>

  <!-- Legend -->
  <g transform="translate(10,50)">
    <rect x="0" y="0" width="280" height="88" rx="6" fill="#fff" stroke="#dde4e8"/>
    <text x="14" y="20" font-size="12" font-weight="700" fill="#1a2227">Legend</text>
    <rect x="14" y="30" width="12" height="12" rx="2" fill="#1a6a5e"/>
    <text x="32" y="41" font-size="11" fill="#3a4a53">Reception schriftlich (eye / reading)</text>
    <rect x="14" y="48" width="12" height="12" rx="2" fill="#2e6b8a"/>
    <text x="32" y="59" font-size="11" fill="#3a4a53">Reception mündlich (ear / listening)</text>
    <rect x="14" y="66" width="12" height="12" rx="2" fill="#c06014"/>
    <text x="32" y="77" font-size="11" fill="#3a4a53">Sprachmittlung mündlich (relay)</text>
  </g>

  <!-- === CATEGORY: Interaktion mündlich (Im) K001-041 === -->
  <g transform="translate(20,150)">
    <rect x="0" y="0" width="200" height="210" rx="8" fill="#fff3e0" stroke="#e8c87a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="10" y="22" font-size="12" font-weight="700" fill="#8b6914">Interaktion mündlich</text>
    <text x="10" y="38" font-size="10" fill="#9a7b2a">K001–041 · ear ↔ mouth</text>
    <rect x="10" y="50" width="180" height="32" rx="4" fill="#fef9e7" stroke="#e6d88a"/>
    <text x="20" y="68" font-size="10" fill="#6b5a00">greetings / introductions</text>
    <rect x="10" y="88" width="180" height="32" rx="4" fill="#fef9e7" stroke="#e6d88a"/>
    <text x="20" y="106" font-size="10" fill="#6b5a00">asking / giving info</text>
    <rect x="10" y="126" width="180" height="32" rx="4" fill="#fef9e7" stroke="#e6d88a"/>
    <text x="20" y="144" font-size="10" fill="#6b5a00">preferences / opinions</text>
    <rect x="10" y="164" width="180" height="32" rx="4" fill="#fef9e7" stroke="#e6d88a"/>
